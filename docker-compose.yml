services:

  # ─── Infrastructure ───────────────────────────────────────────────────────────

  postgres-user:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    networks:
      - shelvio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-tracking:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trackingdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-tracking-data:/var/lib/postgresql/data
    networks:
      - shelvio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trackingdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-recommendation:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: recommendationdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-recommendation-data:/var/lib/postgresql/data
    networks:
      - shelvio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recommendationdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - shelvio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "15672:15672"   # management UI (dev only)
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - shelvio-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Services ─────────────────────────────────────────────────────────────────

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    environment:
      ConnectionStrings__UserDb: "Host=postgres-user;Port=5432;Database=userdb;Username=postgres;Password=${POSTGRES_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: shelvio
      Jwt__Audience: shelvio-clients
    depends_on:
      postgres-user:
        condition: service_healthy
    networks:
      - shelvio-network

  tracking-service:
    build:
      context: ./services/tracking-service
      dockerfile: Dockerfile
    environment:
      ConnectionStrings__TrackingDb: "Host=postgres-tracking;Port=5432;Database=trackingdb;Username=postgres;Password=${POSTGRES_PASSWORD}"
      Jwt__Issuer: shelvio
      Jwt__Audience: shelvio-clients
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
    depends_on:
      postgres-tracking:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - shelvio-network

  content-service:
    build:
      context: ./services/content-service
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      TMDB_API_KEY: ${TMDB_API_KEY}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - shelvio-network

  recommendation-service:
    build:
      context: ./services/recommendation-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-recommendation:5432/recommendationdb"
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq/
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TRACKING_SERVICE_URL: http://tracking-service:8080
    depends_on:
      postgres-recommendation:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - shelvio-network

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    environment:
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: shelvio
      Jwt__Audience: shelvio-clients
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - tracking-service
      - content-service
      - recommendation-service
    networks:
      - shelvio-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    networks:
      - shelvio-network

# ─── Volumes & Networks ───────────────────────────────────────────────────────

volumes:
  postgres-user-data:
  postgres-tracking-data:
  postgres-recommendation-data:
  redis-data:
  rabbitmq-data:

networks:
  shelvio-network:
    driver: bridge
